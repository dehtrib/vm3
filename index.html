<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valentin Masé</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="tabs-container">
  <input type="radio" name="tabs" id="tab-images" checked>
  <label for="tab-images" class="tab-label">Images</label>

  <input type="radio" name="tabs" id="tab-links">
  <label for="tab-links" class="tab-label">Links</label>

  <input type="radio" name="tabs" id="tab-contact">
  <label for="tab-contact" class="tab-label">Contact</label>

  <!-- Images -->
  <div class="tab-content content-images">
    <div class="gallery-vertical" id="gallery">
      <!-- Images from Google Drive will load here automatically -->
    </div>
  </div>

  <!-- Links -->
  <div class="tab-content content-links">
    <div class="info-panel">
      <h2></h2>
      <a href="https://www.proyectoamil.org/exhibicion/heliotropismo/">https://www.proyectoamil.org/exhibicion/heliotropismo/</a><br />
      <a href="https://www.notvital.com/en/fundaziun/schloss-tarasp">https://www.notvital.com/en/fundaziun/schloss-tarasp</a><br />
      <a href="https://de.ra.co/events/2226554">https://de.ra.co/events/2226554</a><br />
      <a href="https://saliva.live/exhibitions/df681407">https://saliva.live/exhibitions/df681407</a>
    </div>
  </div>

  <!-- Contact -->
  <div class="tab-content content-contact">
    <div class="info-panel">
      <h2></h2>
      <p>Valentin Masé <a href="mailto:tourizm.network@gmail.com"></a></p>
      <p>tourizm.network@gmail.com</p>
    </div>
  </div>
</div>

<!-- Lightbox overlay -->
<div id="lightbox" class="lightbox-overlay">
  <img src="" alt="expanded image">
</div>

<script>
// Keep your constants for lightbox and gallery
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImage = lightbox.querySelector("img");

// ✅ Replace the old Drive API fetch with a JSON feed from Google Apps Script
// Deploy a Google Apps Script as a web app that returns JSON list of image URLs
// Example: https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec
const DRIVE_JSON_FEED = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

fetch(DRIVE_JSON_FEED)
  .then(res => res.json())
  .then(imageUrls => {
    if (!imageUrls || imageUrls.length === 0) {
      gallery.innerHTML = "<p>No images found in the folder.</p>";
      return;
    }

    imageUrls.forEach(url => {
      const img = document.createElement("img");
      img.src = url;
      img.alt = "Gallery image";
      img.loading = "lazy";

      img.addEventListener("click", () => {
        lightboxImage.src = img.src;
        lightbox.classList.add("active");
      });

      gallery.appendChild(img);
    });
  })
  .catch(err => {
    console.error("Error loading images:", err);
    gallery.innerHTML = "<p>Failed to load images.</p>";
  });

// Lightbox close
lightbox.addEventListener("click", e => {
  if (e.target !== lightboxImage) {
    lightbox.classList.remove("active");
  }
});
</script>
</body>
</html>
