<body>

<div class="tabs-container">
  <input type="radio" name="tabs" id="tab-images" checked>

  <!-- Images -->
  <div class="tab-content content-images">
    <div class="gallery-vertical" id="gallery">
      <!-- Images from Google Drive will load here automatically -->
    </div>
  </div>

  <!-- Links -->
  <div class="tab-content content-links">
    <div class="info-panel">
      <h2></h2>
      <a href="https://www.proyectoamil.org/exhibicion/heliotropismo/">https://www.proyectoamil.org/exhibicion/heliotropismo/</a><br />

  <!-- Contact -->

      <h2></h2>
      <p>Valentin Masé <a href="mailto:tourizm.network@gmail.com"></a></p>
      <p>tourizm.network@gmail.com</p>
    </div>
  </div>
</div>

<!-- Lightbox overlay -->
<div id="lightbox" class="lightbox-overlay">
  <img src="" alt="expanded image">
</div>

<script>
// ====== CONFIGURE THESE ======
const FOLDER_ID = "1fg3-OhZNBm3dIw3ASl2JFdSZ2c3taEIb"; // Replace with your Google Drive folder ID
const API_KEY = "YOUR_API_KEY_HERE"; // do NOT push your real key     // Replace with your Google API key
// ==============================

const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImage = lightbox.querySelector("img");

// Fetch images from Google Drive folder
fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents and mimeType contains 'image/'&fields=files(id,name)&orderBy=name&key=${API_KEY}`)
  .then(res => res.json())
  .then(data => {
    if (!data.files) return;
    data.files.forEach(file => {
      const img = document.createElement("img");
      img.src = `https://drive.google.com/uc?export=view&id=${file.id}`;
      img.alt = file.name;
      img.loading = "lazy"; // optional lazy load

      // Lightbox click
      img.addEventListener("click", () => {
        lightboxImage.src = img.src;
        lightbox.classList.add("active");
      });

      gallery.appendChild(img);
    });
  })
  .catch(err => console.error("Error loading images:", err));

// Lightbox close
lightbox.addEventListener("click", e => {
  if (e.target !== lightboxImage) {
    lightbox.classList.remove("active");
  }
});
</script>

</body>
</html>
