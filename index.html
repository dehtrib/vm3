<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valentin Masé</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="tabs-container">
  <input type="radio" name="tabs" id="tab-images" checked>
  <label for="tab-images" class="tab-label">Images</label>

  <input type="radio" name="tabs" id="tab-links">
  <label for="tab-links" class="tab-label">Links</label>

  <input type="radio" name="tabs" id="tab-contact">
  <label for="tab-contact" class="tab-label">Contact</label>

  <!-- Images -->
  <div class="tab-content content-images">
    <div class="gallery-vertical" id="gallery">
      <!-- Google Drive images will load here -->
    </div>
  </div>

  <!-- Links -->
  <div class="tab-content content-links">
    <div class="info-panel">
      <a href="https://www.proyectoamil.org/exhibicion/heliotropismo/" target="_blank">
        https://www.proyectoamil.org/exhibicion/heliotropismo/
      </a><br />
      <a href="https://www.notvital.com/en/fundaziun/schloss-tarasp" target="_blank">
        https://www.notvital.com/en/fundaziun/schloss-tarasp
      </a><br />
      <a href="https://de.ra.co/events/2226554" target="_blank">
        https://de.ra.co/events/2226554
      </a><br />
      <a href="https://saliva.live/exhibitions/df681407" target="_blank">
        https://saliva.live/exhibitions/df681407
      </a>
    </div>
  </div>

  <!-- Contact -->
  <div class="tab-content content-contact">
    <div class="info-panel">
      <p>Valentin Masé</p>
      <p><a href="mailto:tourizm.network@gmail.com">tourizm.network@gmail.com</a></p>
    </div>
  </div>
</div>

<!-- Lightbox overlay -->
<div id="lightbox" class="lightbox-overlay">
  <img src="" alt="expanded image">
</div>

<!-- Load API key -->
<script src="js/config.js"></script>

<script>
const FOLDER_ID = "1fg3-OhZNBm3dIw3ASl2JFdSZ2c3taEIb";
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImage = lightbox.querySelector("img");

// ✅ FIXED GOOGLE DRIVE API REQUEST
fetch(
  `https://www.googleapis.com/drive/v3/files` +
  `?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'image/'` +
  `&spaces=drive` +
  `&fields=files(id,name)` +
  `&orderBy=name` +
  `&key=${API_KEY}`
)
.then(res => res.json())
.then(data => {
  if (!data.files || data.files.length === 0) {
    gallery.innerHTML = "<p>No images found in this folder.</p>";
    return;
  }

  data.files.forEach(file => {
    const img = document.createElement("img");
    img.src = `https://drive.google.com/uc?export=view&id=${file.id}`;
    img.alt = file.name;
    img.loading = "lazy";

    img.addEventListener("click", () => {
      lightboxImage.src = img.src;
      lightbox.classList.add("active");
    });

    gallery.appendChild(img);
  });
})
.catch(err => {
  console.error("Error loading images:", err);
  gallery.innerHTML = "<p>Failed to load images.</p>";
});

// Lightbox close
lightbox.addEventListener("click", e => {
  if (e.target !== lightboxImage) {
    lightbox.classList.remove("active");
  }
});
</script>

</body>
</html>
